name: Refresh news feed

on:
  schedule:
    - cron: "0 3,9,15,21 * * *" # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-news.mjs
      - name: Commit if changed
        run: |
          git config user.name "signal-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "chore: refresh news feed"
          git push
